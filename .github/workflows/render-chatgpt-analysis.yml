name: Render ChatGPT analysis

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  render:
    if: >
      github.event.issue.pull_request == null &&
      startsWith(github.event.issue.title, '[AI Newspaper Input]') &&
      contains(github.event.comment.body, 'AI_NEWSPAPER_ANALYSIS_JSON') &&
      github.event.comment.user.login == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Extract and validate analysis JSON
        run: >
          uv run python scripts/extract_chatgpt_analysis.py
          --event-path "${GITHUB_EVENT_PATH}"
          --schema schemas/chatgpt_analysis.schema.json
          --output artifacts/chatgpt_analysis/analysis_output.json
          --news-payload-output artifacts/chatgpt_analysis/news_payload.json

      - name: Render HTML digest
        run: >
          uv run python scripts/render_chatgpt_analysis.py
          --analysis-json artifacts/chatgpt_analysis/analysis_output.json
          --schema schemas/chatgpt_analysis.schema.json
          --news-payload artifacts/chatgpt_analysis/news_payload.json
          --template-dir templates
          --output-dir artifacts/chatgpt_analysis/rendered

      - name: Upload rendered digest
        uses: actions/upload-artifact@v4
        with:
          name: chatgpt-analysis-${{ github.event.issue.number }}-${{ github.run_id }}
          path: |
            artifacts/chatgpt_analysis/analysis_output.json
            artifacts/chatgpt_analysis/news_payload.json
            artifacts/chatgpt_analysis/rendered/digest.html
          retention-days: 2

      - name: Comment with artifact link
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "HTML digest artifact を生成しました。",
                "",
                `Artifact はこの workflow run から確認できます: ${runUrl}`,
                "",
                "Retention: 2 days"
              ].join("\n")
            });
